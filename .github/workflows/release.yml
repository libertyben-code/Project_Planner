name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm install

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $content = Get-Content CHANGELOG.md -Raw -Encoding UTF8
          $escaped = [regex]::Escape($ver)
          $m = [regex]::Match($content, "(?s)## $escaped.*?(?=\n## |\z)")
          $notes = if ($m.Success) { $m.Value.Trim() } else { "Version $ver" }
          "NOTES<<EOF`n$notes`nEOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WMS Project Planner ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.NOTES }}
          releaseDraft: false
          prerelease: false
